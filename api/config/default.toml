[database]
host = "::1"
port = 5432
username = "nanobank_user"
password = "secure_nano_password_2024!"
database_name = "nano_bank_db"
max_connections = 10
min_connections = 1
acquire_timeout = 30

[server]
host = "0.0.0.0"
port = 8081
keep_alive = 60

[jwt]
secret = "your-super-secret-jwt-key-change-this-in-production"
# Short-lived access token (15 min). Refresh rotates within refresh_expires_in.
expires_in = 900
refresh_expires_in = 604800
issuer = "nano-bank"

[security]
password_min_length = 8
max_login_attempts = 5
lockout_duration = 900
session_timeout = 86400
require_mfa = false
# Secret the mock Visa network presents to mint a service token (client-credentials).
service_client_secret = "nano-bank-visa-network-secret-change-me"

[logging]
level = "info"
format = "json"

[interac]
# Hold lifetime before an e-Transfer auto-expires (real Interac: 30 days).
expiry_days = 30
# Max amount per e-Transfer (string so it deserialises to Decimal exactly).
max_etransfer_amount = "3000"

[lynx]
# High-value floor: the minimum wire amount (string so it deserialises to
# Decimal exactly). No ceiling — Lynx is the high-value RTGS rail.
min_amount = "10000"
# How old (minutes) a `sent` wire must be before the admin sweep rejects it.
stale_minutes = 60
