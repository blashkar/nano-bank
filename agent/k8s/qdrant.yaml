apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-qdrant-pvc
  namespace: nano-bank
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: 1Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-qdrant
  namespace: nano-bank
  labels: { app: agent-qdrant }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: agent-qdrant } }
  template:
    metadata: { labels: { app: agent-qdrant } }
    spec:
      containers:
      - name: qdrant
        image: qdrant/qdrant:latest
        ports: [ { containerPort: 6333 } ]
        volumeMounts:
        - name: data
          mountPath: /qdrant/storage
      volumes:
      - name: data
        persistentVolumeClaim: { claimName: agent-qdrant-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: agent-qdrant
  namespace: nano-bank
spec:
  selector: { app: agent-qdrant }
  ports: [ { port: 6333, targetPort: 6333 } ]
