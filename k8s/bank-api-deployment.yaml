apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-api
  namespace: nano-bank
  labels: { app: bank-api }
spec:
  replicas: 1
  selector:
    matchLabels: { app: bank-api }
  template:
    metadata:
      labels: { app: bank-api }
    spec:
      containers:
      - name: bank-api
        image: nano-bank-api:dev
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
        env:
        - name: NANO_BANK__DATABASE__HOST
          value: postgres-service
        - name: NANO_BANK__DATABASE__PORT
          value: "5432"
        - name: CORE_BACKEND
          value: modern
        - name: MODERN_CORE_URL
          value: http://modern-core:8091
        readinessProbe:
          httpGet: { path: /health, port: 8081 }
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bank-api
  namespace: nano-bank
spec:
  selector: { app: bank-api }
  ports:
  - port: 8081
    targetPort: 8081
